<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Markdown and Mermaid to DOCX - Combined Editor</title>

    <!-- Styles -->
    <link rel="stylesheet" href="styles.css">

    <!-- MathJax v3 CDN -->
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['$', '$']],
                displayMath: [['$$', '$$']],
                processEscapes: true
            },
            svg: {
                fontCache: 'none'
            },
            startup: {
                pageReady: () => {
                    console.log('✓ MathJax loaded successfully');
                    return MathJax.startup.defaultPageReady();
                }
            }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>

    <!-- CDN Scripts -->
    <script src="https://unpkg.com/mermaid@11.12.2/dist/mermaid.min.js"></script>
    <script src="https://unpkg.com/beautiful-mermaid@0.1.3/dist/beautiful-mermaid.browser.global.js"></script>
    <script src="https://unpkg.com/docx@9.5.0/dist/index.iife.js"></script>
    <script src="https://unpkg.com/file-saver@2.0.5/dist/FileSaver.min.js"></script>
    <script src="https://unpkg.com/marked@15.0.2/marked.min.js"></script>
    <script src="https://unpkg.com/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
</head>
<body>

    <div class="container">
        <div class="toolbar">
            <div class="toolbar-left">
                <h1 data-i18n="title">Markdown & Mermaid to DOCX</h1>
                <div class="toolbar-group toolbar-links">
                    <a href="https://github.com/xlight/md-mermaid-toDocx" target="_blank" class="github-link compact-link" title="View on GitHub" aria-label="View on GitHub">
                        <svg viewBox="0 0 16 16" aria-hidden="true">
                            <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"></path>
                        </svg>
                    </a>
                    <a href="https://github.com/xlight/md-mermaid-toDocx" target="_blank" class="star-button compact-link" title="Star this project" aria-label="Star this project">
                        <svg viewBox="0 0 16 16" aria-hidden="true">
                            <path d="M8 .25a.75.75 0 01.673.418l1.882 3.815 4.21.612a.75.75 0 01.416 1.279l-3.046 2.97.719 4.192a.75.75 0 01-1.088.791L8 12.347l-3.766 1.98a.75.75 0 01-1.088-.79l.72-4.194L.818 6.374a.75.75 0 01.416-1.28l4.21-.611L7.327.668A.75.75 0 018 .25z"></path>
                        </svg>
                    </a>
                </div>
            </div>

            <div class="toolbar-center">
                <div class="toolbar-group">
                <label for="fontPicker" data-i18n="fontLabel">字体:</label>
                <select id="fontPicker">
                    <optgroup data-i18n="chineseFonts" label="中文字体">
                        <option value="Microsoft YaHei" selected>微软雅黑 (Microsoft YaHei)</option>
                        <option value="SimSun">宋体 (SimSun)</option>
                        <option value="SimHei">黑体 (SimHei)</option>
                        <option value="KaiTi">楷体 (KaiTi)</option>
                        <option value="FangSong">仿宋 (FangSong)</option>
                        <option value="STSong">华文宋体 (STSong)</option>
                        <option value="STHeiti">华文黑体 (STHeiti)</option>
                        <option value="STKaiti">华文楷体 (STKaiti)</option>
                        <option value="STFangsong">华文仿宋 (STFangsong)</option>
                        <option value="NSimSun">新宋体 (NSimSun)</option>
                        <option value="PingFang SC">苹方 (PingFang SC)</option>
                        <option value="Heiti SC">黑体-简 (Heiti SC)</option>
                        <option value="STXihei">华文细黑 (STXihei)</option>
                    </optgroup>
                    <optgroup data-i18n="englishFonts" label="英文字体">
                        <option value="Calibri">Calibri</option>
                        <option value="Arial">Arial</option>
                        <option value="Times New Roman">Times New Roman</option>
                        <option value="Courier New">Courier New</option>
                        <option value="Verdana">Verdana</option>
                        <option value="Tahoma">Tahoma</option>
                        <option value="Georgia">Georgia</option>
                        <option value="Aptos">Aptos</option>
                    </optgroup>
                </select>
            </div>

            <div class="toolbar-group">
                <button id="mermaidConfigButton" data-i18n="mermaidConfigButton" title="Mermaid 配置">⚙️ 图表配置</button>
            </div>

                <div class="toolbar-group toolbar-view-mode-controls" role="group" aria-label="View mode">
                    <button id="viewModeSplit" class="secondary-button view-mode-button" type="button" data-i18n="viewModeSplit">分栏</button>
                    <button id="viewModeEditor" class="secondary-button view-mode-button" type="button" data-i18n="viewModeEditor">仅编辑</button>
                    <button id="viewModePreview" class="secondary-button view-mode-button" type="button" data-i18n="viewModePreview">仅预览</button>
                </div>
            </div>

            <div class="toolbar-right">
                <div class="toolbar-group toolbar-actions">
                    <button id="printPreviewButton" class="secondary-button" data-i18n="printButton">打印预览</button>
                    <button id="generateDocxButton" class="primary-button" data-i18n="generateButton">生成 DOCX</button>
                </div>

                <div class="toolbar-group toolbar-lang-group">
                    <select id="langPicker" aria-label="Language">
                        <option value="zh-CN">简体中文</option>
                        <option value="en">English</option>
                    </select>
                </div>
            </div>
        </div>
        <div id="toolbarProgress" class="toolbar-progress-line" aria-hidden="true"></div>
        <div id="status" class="status-sr-only" aria-live="polite"></div>
        <div id="toastContainer" class="toast-container" aria-live="polite" aria-atomic="true"></div>

        <div class="editor-preview-container">
            <div class="editor-wrapper">
                <div class="section-header" data-i18n="editorHeader">编辑器 (支持 Markdown 和 Mermaid)</div>
                <textarea id="combinedContentInput" data-i18n-placeholder="editorPlaceholder" placeholder="在此输入 Markdown 和 Mermaid 内容..."></textarea>
            </div>

            <div id="splitDivider" class="split-divider" aria-hidden="true"></div>

            <div class="preview-wrapper">
                <div class="section-header" data-i18n="previewHeader">实时预览</div>
                <div id="documentPreview">
                    <p data-i18n="previewPlaceholder">预览将显示在此处...</p>
                </div>
            </div>
        </div>
    </div>

    <!-- 自定义主题模态框 -->
    <div id="customThemeModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 data-i18n="customThemeTitle">自定义主题</h2>
                <span class="close-modal" id="closeCustomThemeModal">&times;</span>
            </div>
            <div class="modal-body">
                <!-- 必填颜色 -->
                <div class="color-input-group">
                    <label for="themeBg" data-i18n="themeBgLabel">背景色 (bg):</label>
                    <input type="color" id="themeBgColor" value="#ffffff">
                    <input type="text" id="themeBg" value="#ffffff" placeholder="#ffffff">
                </div>
                <div class="color-input-group">
                    <label for="themeFg" data-i18n="themeFgLabel">前景色 (fg):</label>
                    <input type="color" id="themeFgColor" value="#09090b">
                    <input type="text" id="themeFg" value="#09090b" placeholder="#09090b">
                </div>

                <!-- 可选颜色 -->
                <div class="optional-colors">
                    <div class="optional-colors-header">
                        <input type="checkbox" id="enableOptionalColors">
                        <label for="enableOptionalColors" data-i18n="optionalColorsLabel">启用可选颜色</label>
                    </div>
                    <div id="optionalColorsContent" class="optional-colors-content">
                        <div class="color-input-group">
                            <label for="themeLine" data-i18n="themeLineLabel">线条色 (line):</label>
                            <input type="color" id="themeLineColor" value="#71717a">
                            <input type="text" id="themeLine" value="#71717a" placeholder="#71717a">
                        </div>
                        <div class="color-input-group">
                            <label for="themeAccent" data-i18n="themeAccentLabel">强调色 (accent):</label>
                            <input type="color" id="themeAccentColor" value="#3b82f6">
                            <input type="text" id="themeAccent" value="#3b82f6" placeholder="#3b82f6">
                        </div>
                        <div class="color-input-group">
                            <label for="themeMuted" data-i18n="themeMutedLabel">柔和色 (muted):</label>
                            <input type="color" id="themeMutedColor" value="#a1a1aa">
                            <input type="text" id="themeMuted" value="#a1a1aa" placeholder="#a1a1aa">
                        </div>
                        <div class="color-input-group">
                            <label for="themeSurface" data-i18n="themeSurfaceLabel">表面色 (surface):</label>
                            <input type="color" id="themeSurfaceColor" value="#f4f4f5">
                            <input type="text" id="themeSurface" value="#f4f4f5" placeholder="#f4f4f5">
                        </div>
                        <div class="color-input-group">
                            <label for="themeBorder" data-i18n="themeBorderLabel">边框色 (border):</label>
                            <input type="color" id="themeBorderColor" value="#e4e4e7">
                            <input type="text" id="themeBorder" value="#e4e4e7" placeholder="#e4e4e7">
                        </div>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button id="applyThemeButton" class="primary" data-i18n="applyThemeButton">应用主题</button>
                <button id="saveCustomThemeButton" data-i18n="saveCustomThemeButton">保存为自定义</button>
                <button id="exportThemeButton" data-i18n="exportThemeButton">导出 JSON</button>
                <button id="importThemeButton" data-i18n="importThemeButton">导入 JSON</button>
                <input type="file" id="importThemeFile" accept=".json" style="display:none;">
            </div>
        </div>
    </div>

    <!-- Mermaid 配置模态框 -->
    <div id="mermaidConfigModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 data-i18n="mermaidConfigTitle">Mermaid 图表配置</h2>
                <span class="close-modal" id="closeMermaidConfigModal">&times;</span>
            </div>
            <div class="modal-body">
                <!-- 主题选择 -->
                <div class="config-section">
                    <h3 data-i18n="themeSectionTitle">主题设置</h3>
                    <div class="toolbar-group">
                        <label for="themePicker" data-i18n="themeLabel">主题:</label>
                        <select id="themePicker">
                            <option value="zinc-light">Zinc Light</option>
                        </select>
                        <button id="customThemeButton" data-i18n="customThemeButton" title="自定义主题">🎨 自定义</button>
                    </div>
                    <p class="config-hint" data-i18n="themeHint">主题仅适用于流程图、时序图、类图和 ER 图</p>
                </div>

                <!-- 输出模式 -->
                <div class="config-section">
                    <h3 data-i18n="outputSectionTitle">输出模式</h3>
                    <div class="toolbar-group">
                        <label for="outputMode" data-i18n="outputModeLabel">输出:</label>
                        <select id="outputMode">
                            <option value="svg">SVG (主题)</option>
                            <option value="ascii">ASCII (文本)</option>
                            <option value="classic" selected>经典 (兼容)</option>
                        </select>
                    </div>
                    <label id="asciiCharsetLabel" style="display:none; margin-top: 10px;">
                        <input type="checkbox" id="useAscii">
                        <span data-i18n="pureAsciiLabel">纯 ASCII 字符</span>
                    </label>

                    <div class="output-mode-help" style="margin-top: 15px;">
                        <h4 data-i18n="outputModeHelpTitle">输出模式说明：</h4>
                        <ul>
                            <li><strong>SVG (主题)</strong>: <span data-i18n="svgModeDesc">应用主题到支持的图表，其他图表使用原生样式</span></li>
                            <li><strong>ASCII (文本)</strong>: <span data-i18n="asciiModeDesc">将图表转换为纯文本格式，适合终端和聊天工具</span></li>
                            <li><strong>经典 (兼容)</strong>: <span data-i18n="classicModeDesc">所有图表使用原生 Mermaid.js 渲染，最大兼容性</span></li>
                        </ul>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button id="closeMermaidConfigButton" class="primary" data-i18n="closeButton">关闭</button>
            </div>
        </div>
    </div>

    <!-- Application Script -->
    <script src="app.js"></script>
</body>
</html>
